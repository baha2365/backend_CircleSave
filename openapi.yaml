openapi: 3.0.3
info:
  title: CircleSave API
  version: 1.0.0
  description: API documentation for CircleSave backend (Auth + Users + System)

servers:
  - url: http://localhost:3000/api/v1
    description: Local server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User management
  - name: Health
    description: System health checks

paths:

  # ===================== HEALTH =====================
  /health:
    get:
      tags:
        - Health
      summary: Check server health
      responses:
        "200":
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ===================== AUTH =====================

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: test@gmail.com
                password:
                  type: string
                  example: 12345678
      responses:
        "201":
          description: User created successfully

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: test@gmail.com
                password:
                  type: string
                  example: 12345678
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string

  # ===================== USERS =====================

  /users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT